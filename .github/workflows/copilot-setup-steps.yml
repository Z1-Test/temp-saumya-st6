name: Copilot Setup Simple
# This workflow provides the minimal setup for GitHub Copilot Coding Agent
on:
  workflow_dispatch:
jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment:
      name: copilot
    
    # EXPLICITLY MAP SECRETS TO ENVIRONMENT VARIABLES
    env:
      COPILOT_MCP_FIREBASE_PROJECT_ID: ${{ secrets.COPILOT_MCP_FIREBASE_PROJECT_ID }}
      COPILOT_MCP_WIF_PROVIDER: ${{ secrets.COPILOT_MCP_WIF_PROVIDER }}
      COPILOT_MCP_WIF_SERVICE_ACCOUNT: ${{ secrets.COPILOT_MCP_WIF_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Persist these to the final Copilot Agent session
      - name: Export Secrets to Agent Environment
        run: |
          echo "COPILOT_MCP_FIREBASE_PROJECT_ID=${{ secrets.COPILOT_MCP_FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV
          echo "COPILOT_MCP_WIF_PROVIDER=${{ secrets.COPILOT_MCP_WIF_PROVIDER }}" >> $GITHUB_ENV
          echo "COPILOT_MCP_WIF_SERVICE_ACCOUNT=${{ secrets.COPILOT_MCP_WIF_SERVICE_ACCOUNT }}" >> $GITHUB_ENV

      - name: Print env var and secret keys after checkout
        run: printenv | cut -d= -f1 | sort

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Print env var and secret keys after setup-node
        run: printenv | cut -d= -f1 | sort

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Print env var and secret keys after firebase install
        run: printenv | cut -d= -f1 | sort

      - name: Verify Firebase CLI installation
        run: |
          firebase --version
          echo "✓ Firebase CLI installed successfully"

      - name: Print env var and secret keys after verify
        run: printenv | cut -d= -f1 | sort
